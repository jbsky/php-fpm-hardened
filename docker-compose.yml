# =====================================================================
#  Stack PHP-FPM Hardened (WordPress-optimized)
# =====================================================================

x-common-security: &common-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  php-fpm:
    <<: *common-security
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY:-gitlab.home.arpa:5050}/docker/php:${TAG:-latest}
    container_name: php-fpm-hardened
    hostname: php-fpm
    environment:
      - WP_DEBUG=${WP_DEBUG:-0}
      - PHP_PM_MAX_CHILDREN=${PHP_PM_MAX_CHILDREN:-50}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-64M}
      - TZ=${TZ:-UTC}
    volumes:
      - html:/var/www/html
    tmpfs:
      - /tmp:size=64m,mode=1777,nodev,nosuid,noexec
      - /var/run/php-fpm:size=1m,mode=0755,uid=1999,gid=1999
      - /var/log/php-fpm:size=32m,mode=0755,uid=1999,gid=1999
    networks:
      web:
        aliases: [php-fpm]
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "/usr/local/bin/init", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  web:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/16

volumes:
  html: { driver: local }
