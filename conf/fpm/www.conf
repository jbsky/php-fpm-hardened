; =====================================================================
;  PHP-FPM Pool — WordPress-optimized (www)
; =====================================================================

[www]
; --- User / Group ---
user = phpfpm
group = phpfpm

; --- Listen ---
listen = 0.0.0.0:9000
listen.owner = phpfpm
listen.group = phpfpm
listen.mode = 0660

; --- Process Management ---
; dynamic: adjusts children count based on load
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 500
pm.process_idle_timeout = 10s

; --- Status / Health ---
pm.status_path = /status
ping.path = /ping
ping.response = pong

; --- Logging ---
access.log = /dev/stdout
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

slowlog = /dev/stderr
request_slowlog_timeout = 5s
request_terminate_timeout = 300s

; --- Security ---
; Catch workers output (error_log goes to stderr)
catch_workers_output = yes
decorate_workers_output = no

; Clear env for security (controlled via entrypoint)
clear_env = yes

; Allowed extensions for PHP-FPM
security.limit_extensions = .php
