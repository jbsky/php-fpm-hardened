; =====================================================================
;  WordPress — Upload, post, and media settings
; =====================================================================

[WordPress]
; Upload limits (match nginx client_max_body_size)
upload_max_filesize = 64M
post_max_size = 64M

; SMTP — handled externally (WP plugin or relay container)
; Do NOT embed SMTP credentials in the image.
; Use wp-mail-smtp plugin or msmtp sidecar.
sendmail_path = /usr/sbin/sendmail -t -i

; Realpath cache (reduces stat() calls on large WP installs)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; PCRE (WordPress patterns can be complex)
pcre.backtrack_limit = 1000000
pcre.recursion_limit = 100000
