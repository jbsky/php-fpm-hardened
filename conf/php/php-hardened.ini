; =====================================================================
;  PHP Hardening — Security settings
;  Disable dangerous functions, hide version, restrict paths
; =====================================================================

[PHP]
; --- Security ---
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source,pcntl_exec

; Restrict file access
open_basedir = /var/www/html:/tmp:/usr/local/lib/php
doc_root = /var/www/html

; Session hardening
session.cookie_httponly = On
session.cookie_secure = On
session.cookie_samesite = Strict
session.use_strict_mode = On
session.use_only_cookies = On
session.name = __SESS

; --- Limits ---
max_execution_time = 300
max_input_time = 60
max_input_vars = 3000
memory_limit = 256M

; --- Misc ---
date.timezone = UTC
cgi.fix_pathinfo = 0
allow_url_fopen = On
allow_url_include = Off
default_charset = "UTF-8"
