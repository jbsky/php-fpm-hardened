# =====================================================================
#  Registry Cleanup — Prune old immutable version tags
#
#  build-push.yml pushes a brand new immutable version tag (e.g.
#  php-fpm-hardened:<version>) on every run, in addition to :latest, on both
#  Docker Hub and GHCR, without ever retiring the previous one. Old
#  tags accumulate forever and eventually point at genuinely
#  vulnerable builds still publicly pullable (pattern confirmed across
#  the docker-hardened fleet, e.g. nginx-hardened 1.30.1/1.30.2 still
#  live months after the CVE fix landed). This workflow prunes them,
#  keeping only the last few semver tags plus :latest.
#
#  Callable from build-push.yml after a push, and directly
#  workflow_dispatch-able to clean up backlog on demand.
# =====================================================================
name: registry-cleanup

on:
  workflow_call:
  workflow_dispatch:

env:
  IMAGE_NAME: php-fpm-hardened
  KEEP_COUNT: 3

permissions:
  packages: write

jobs:
  prune:
    name: Prune old registry tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prune old Docker Hub tags
        if: steps.dockerhub.outputs.available == 'true'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prune-registry-tags.sh "${{ secrets.DOCKERHUB_USERNAME }}" "${{ env.IMAGE_NAME }}" "${{ env.KEEP_COUNT }}"

      - name: Prune old GHCR tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/prune-ghcr-tags.sh "${{ github.repository_owner }}" "${{ env.IMAGE_NAME }}" "${{ env.KEEP_COUNT }}"
